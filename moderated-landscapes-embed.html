<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workflow Landscapes — Moderated Sessions</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;user-select:none;background:#0f0f1a;color:#e2e8f0;}
  .page-wrap{padding:24px 40px 40px;min-width:900px;}
  h1{font-size:22px;font-weight:700;margin-bottom:4px;color:#fff;}
  .subtitle{font-size:13px;margin-bottom:12px;max-width:820px;line-height:1.5;color:#94a3b8;}
  .legend{display:flex;gap:18px;margin:8px 0 10px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:#94a3b8;}
  .legend-swatch{width:18px;height:7px;border-radius:3px;}
  .instructions{font-size:11px;margin-bottom:20px;padding:7px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);display:inline-block;color:#475569;background:rgba(255,255,255,0.03);}
  .instructions strong{color:#64748b;}
  .participant-row{position:relative;margin-bottom:7px;border-radius:12px;padding:9px 20px 5px;border:1px solid rgba(255,255,255,0.05);cursor:grab;transition:all .15s;background:rgba(255,255,255,0.02);}
  .participant-row:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);}
  .participant-row.dragging{opacity:.9;transform:scale(1.01);z-index:100;cursor:grabbing;box-shadow:0 8px 32px rgba(0,0,0,0.5);border-color:rgba(255,255,255,0.2);}
  .drag-over-above{border-top:2px solid #a78bfa !important;}
  .drag-over-below{border-bottom:2px solid #a78bfa !important;}
  .row-header{display:flex;align-items:baseline;gap:8px;}
  .drag-handle{font-size:14px;cursor:grab;margin-right:2px;color:#334155;transition:color .15s;}
  .participant-row:hover .drag-handle{color:#64748b;}
  .pid{font-size:13px;font-weight:700;color:#fff;}
  .prole{font-size:10px;color:#64748b;}
  .ppattern{margin-left:auto;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:2px 8px;border-radius:8px;white-space:nowrap;}
  .chart-area{position:relative;height:64px;margin-top:3px;}
  .chart-area svg{display:block;width:100%;height:64px;}
  .phase-labels{position:relative;height:18px;margin-top:1px;}
  .phase-label{position:absolute;font-size:8px;text-align:center;transform:translateX(-50%);line-height:1.3;white-space:nowrap;color:#475569;transition:color .15s;}
  .phase-label:hover{color:#e2e8f0 !important;}
  .phase-label.ai-label{color:#c4b5fd !important;font-weight:600;}
  .phase-label.ext-label{color:#f9a8d4 !important;font-weight:600;}
  .phase-label.elem-label{color:#6ee7b7 !important;font-weight:600;}
  .phase-label.ask-label{color:#93c5fd !important;font-weight:600;}
  .phase-label.has-quote{cursor:pointer;}
  .phase-label.has-quote:hover{text-decoration:underline;text-underline-offset:2px;}
  #cursor-dot{position:fixed;width:12px;height:12px;border-radius:50%;pointer-events:none;z-index:500;opacity:0;transition:opacity .12s;transform:translate(-50%,-50%);}
  #cursor-dot.visible{opacity:1;}
  #cursor-dot::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:inherit;opacity:.3;animation:dp 1.4s ease-in-out infinite;}
  #cursor-dot::after{content:'';position:absolute;inset:-9px;border-radius:50%;background:inherit;opacity:.12;animation:dp 1.4s ease-in-out infinite .2s;}
  @keyframes dp{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.5);opacity:.08}}
  #cursor-line{position:fixed;width:1px;pointer-events:none;z-index:499;opacity:0;transition:opacity .12s;}
  #cursor-line.visible{opacity:.25;}
  #quote-tooltip{position:fixed;max-width:320px;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);pointer-events:auto;opacity:0;transition:opacity .15s;z-index:1000;font-size:12px;line-height:1.5;display:none;background:#1e1e2e;}
  #quote-tooltip.visible{opacity:1;display:block;}
  .tooltip-close{position:absolute;top:6px;right:8px;font-size:14px;cursor:pointer;opacity:.4;transition:opacity .15s;background:none;border:none;padding:2px 4px;line-height:1;color:#e2e8f0;}
  .tooltip-close:hover{opacity:1;}
  .tooltip-step{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block;padding-right:16px;}
  .tooltip-quote{font-style:italic;display:block;color:#e2e8f0;}
  .tooltip-quote::before{content:'\201C';color:#a78bfa;font-size:15px;margin-right:2px;}
  .tooltip-quote::after{content:'\201D';color:#a78bfa;font-size:15px;margin-left:2px;}
  .tooltip-pid{font-size:10px;margin-top:6px;display:block;color:#64748b;}
</style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-line"></div>
<div id="quote-tooltip">
  <button class="tooltip-close">&times;</button>
  <span class="tooltip-step"></span>
  <span class="tooltip-quote"></span>
  <span class="tooltip-pid"></span>
</div>
<div class="page-wrap">
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#a78bfa,#c4b5fd);"></div>Canva AI</div>
    <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#34d399,#6ee7b7);"></div>AI in Elements</div>
    <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#60a5fa,#93c5fd);"></div>Ask Canva / Magic Write</div>
    <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#f472b6,#f9a8d4);"></div>External AI</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(148,163,184,0.2);"></div>Manual / Search</div>
  </div>
  <div class="instructions"><strong>↕ Drag rows</strong> to reorder &nbsp;|&nbsp; <strong>Click steps</strong> for quotes</div>
  <div id="sortable-container"></div>
</div>
<script>
const P=[
  {id:'P1',role:'Media Production Agency',pattern:'End-loaded',pc:'#a78bfa',segs:[{x1:0,x2:.13,pk:.08,c:'rgba(148,163,184,0.12)',l:'Search templates',lc:'',q:"The best thing about Canva is the templates\u2026 there\u2019s a lot of variability\u2026 most of them are really, really well done."},{x1:.13,x2:.28,pk:.06,c:'rgba(148,163,184,0.08)',l:'Select pages',lc:'',q:"If I find one or two pages out of the 15 that I like, I will use those as the basic foundation."},{x1:.28,x2:.55,pk:.10,c:'rgba(148,163,184,0.12)',l:'Manual customisation',lc:'',q:"It\u2019s way easier for me to just find the template and then add the colors myself than it is to prompt."},{x1:.55,x2:.72,pk:.55,c:'#60a5fa',l:'Magic Write',lc:'ask-label',q:"I would go into Magic Write\u2026 ask it to write an intro, and then once it generates an intro that I\u2019m okay with, I go in and edit it."},{x1:.72,x2:.88,pk:.72,c:'#34d399',l:'Generate in Elements',lc:'elem-label',q:"90% of generating, to me, is for flourishes and final touches. It\u2019s not for the overarching theme."},{x1:.88,x2:1,pk:.10,c:'rgba(148,163,184,0.12)',l:'Manual polish',lc:'',q:"I would take this file and edit it myself\u2026 add effects, a drop shadow, a neon glow."}]},
  {id:'P2',role:'Marketing Agency + Nonprofit',pattern:'Barbell',pc:'#60a5fa',segs:[{x1:0,x2:.08,pk:.08,c:'rgba(148,163,184,0.12)',l:'Search',lc:'',q:"For the layout of a slideshow, I don\u2019t need anything that AI has to generate."},{x1:.08,x2:.26,pk:.82,c:'#34d399',l:'Generate niche visuals',lc:'elem-label',q:"If there\u2019s something really creative or gimmicky\u2026 I\u2019ll probably try and have AI specifically generate it."},{x1:.26,x2:.42,pk:.68,c:'#a78bfa',l:'Edit with Canva AI',lc:'ai-label',q:"If it\u2019s close and I can give it a little more information to get it to the end, then that\u2019s good to interact with it."},{x1:.42,x2:.64,pk:.07,c:'rgba(148,163,184,0.08)',l:'Manual middle work',lc:'',q:"In the middle, assuming I can do most things on my own without AI\u2026 I use it less."},{x1:.64,x2:.84,pk:.75,c:'#a78bfa',l:'AI polish & effects',lc:'ai-label',q:"At the end, when I\u2019m trying to touch things up and create these little specific things, I probably use it more."},{x1:.84,x2:1,pk:.08,c:'rgba(148,163,184,0.08)',l:'Final check',lc:'',q:"I would copy this element, bring it over here, paste it\u2026 and figure out the way to position it best."}]},
  {id:'P3',role:'Content Advisor \u00b7 Mining + Freelance',pattern:'Search-first, AI fallback',pc:'#f472b6',segs:[{x1:0,x2:.18,pk:.85,c:'#f472b6',l:'External LLM',lc:'ext-label',q:"Having that written list sorted before you start to do any of the visuals for the presentation."},{x1:.18,x2:.40,pk:.08,c:'rgba(148,163,184,0.12)',l:'Search stock',lc:'',q:"My preference is to see what already exists\u2026 I don\u2019t like using AI if I don\u2019t have to because of the sustainability issues."},{x1:.40,x2:.58,pk:.50,c:'#34d399',l:'Generate if fails',lc:'elem-label',q:"There\u2019s no options that have anything like what I\u2019d be looking for. So that\u2019s where I\u2019d go to generate."},{x1:.58,x2:.74,pk:.08,c:'rgba(148,163,184,0.08)',l:'Background removal',lc:'',q:"I remove backgrounds and create composites\u2026 it\u2019s about realizing the vision rather than just relying on AI."},{x1:.74,x2:.88,pk:.35,c:'#60a5fa',l:'Magic Extend',lc:'ask-label',q:"I\u2019d go into edit and try magic extend\u2026 to magically fill out the background."},{x1:.88,x2:1,pk:.06,c:'rgba(148,163,184,0.08)',l:'Fix artefacts',lc:'',q:"Sometimes I\u2019ll go in with the manual eraser and remove or add back in parts that it\u2019s got wrong."}]},
  {id:'P4',role:'Corporate Comms \u00b7 Comcast',pattern:'Last resort',pc:'#f87171',segs:[{x1:0,x2:.24,pk:.06,c:'rgba(148,163,184,0.10)',l:'Duplicate past project',lc:'',q:"I can dupe a previous presentation\u2026 just do a carbon copy of what we did for Compliance Week."},{x1:.24,x2:.48,pk:.08,c:'rgba(148,163,184,0.12)',l:'Search brand library',lc:'',q:"I go searching for stuff first. Is there an existing cartoon picture or an actual photo of this?"},{x1:.48,x2:.70,pk:.07,c:'rgba(148,163,184,0.10)',l:'Manual layout',lc:'',q:"I would just start editing\u2026 adding text, using our font\u2026 pulling logos."},{x1:.70,x2:.84,pk:.22,c:'#34d399',l:'Generate (reluctantly)',lc:'elem-label',q:"I would use AI as like a last resort where I\u2019m like, okay, that\u2019s kind of as far as I\u2019m gonna go."},{x1:.84,x2:1,pk:.06,c:'rgba(148,163,184,0.08)',l:'Manual workarounds',lc:'',q:"It\u2019s almost like going with what you know and going with the path of least resistance."}]},
  {id:'P5',role:'Digital Marketing \u00b7 Italy',pattern:'Surgical',pc:'#34d399',segs:[{x1:0,x2:.16,pk:.60,c:'#f472b6',l:'External LLMs',lc:'ext-label',q:"I\u2019m working outside Canva with LLMs and Google Docs to create an outline."},{x1:.16,x2:.32,pk:.08,c:'rgba(148,163,184,0.12)',l:'Select template',lc:'',q:"I never start with a blank page. We always start with a template\u2026 I\u2019m not a designer."},{x1:.32,x2:.48,pk:.08,c:'rgba(148,163,184,0.10)',l:'Manual transposition',lc:'',q:"I want to feel the presentation is being built and add that human touch."},{x1:.48,x2:.64,pk:.48,c:'#60a5fa',l:'Ask Canva: translate',lc:'ask-label',q:"This sentence is too hard for my audience\u2026 Ask Canva will respect the size so the output still looks good."},{x1:.64,x2:.82,pk:.45,c:'#34d399',l:'Generate in Elements',lc:'elem-label',q:"It sometimes happens that I have to create an icon, and I generate it inside Canva directly."},{x1:.82,x2:1,pk:.07,c:'rgba(148,163,184,0.08)',l:'Manual edits',lc:'',q:"I would go inside and edit the content just like I want."}]},
  {id:'P6',role:'Sales \u00b7 Marketing Agency + Nonprofit',pattern:'External ideation \u2192 execution',pc:'#f472b6',segs:[{x1:0,x2:.10,pk:.08,c:'rgba(148,163,184,0.12)',l:'Search templates',lc:'',q:"It tells me what I should even include in a pitch deck."},{x1:.10,x2:.28,pk:.80,c:'#f472b6',l:'ChatGPT \u2192 Gemini',lc:'ext-label',q:"I need you to make this more fun\u2026 a different vibe\u2026 put a spin on this for the Italian presentation."},{x1:.28,x2:.42,pk:.30,c:'#a78bfa',l:'Ingest (fails)',lc:'ai-label',q:"I tried to format it into the slide with bullet points. And it cannot do that."},{x1:.42,x2:.60,pk:.62,c:'#34d399',l:'Magic Media',lc:'elem-label',q:"Something off-putting and unique is when I need to describe this in more detail."},{x1:.60,x2:.78,pk:.07,c:'rgba(148,163,184,0.08)',l:'Manual brand work',lc:'',q:"I need to make sure it aligns with my brand\u2026 shifting all the colors and fonts."},{x1:.78,x2:1,pk:.42,c:'#a78bfa',l:'AI conversation',lc:'ai-label',q:"Kind of like your precursor history\u2026 I can see the previous prompts that I put in."}]},
  {id:'P7',role:'Collaborative Design',pattern:'Front-loaded',pc:'#22d3ee',segs:[{x1:0,x2:.26,pk:.92,c:'#a78bfa',l:'Home \u2192 AI base',lc:'ai-label',q:"I directly jump and use AI because with a detailed prompt I can explain exactly what I want\u2026 without wasting time."},{x1:.26,x2:.48,pk:.07,c:'rgba(148,163,184,0.10)',l:'Manual refinement',lc:'',q:"The other stuff I can do without AI. It\u2019s just adding text and changing colors, changing fonts."},{x1:.48,x2:.62,pk:.08,c:'rgba(148,163,184,0.12)',l:'Search Elements',lc:'',q:"I want to add something like a 3D image\u2026 I can just click here and generate it."},{x1:.62,x2:.82,pk:.58,c:'#a78bfa',l:'Edit with Canva AI',lc:'ai-label',q:"I can refine this picture\u2026 I just click on it and write\u2026 change from daylight to nighttime."},{x1:.82,x2:1,pk:.07,c:'rgba(148,163,184,0.08)',l:'Final adjustments',lc:'',q:"No need for AI intervention\u2026 I can do them manually."}]}
];

const cd=document.getElementById('cursor-dot'),cl=document.getElementById('cursor-line'),tt=document.getElementById('quote-tooltip'),tS=tt.querySelector('.tooltip-step'),tQ=tt.querySelector('.tooltip-quote'),tP=tt.querySelector('.tooltip-pid'),ctr=document.getElementById('sortable-container');
let order=[...P],aL=null;

function showTT(el,l,q,pid,c){tS.textContent=l;tS.style.color=c||'#94a3b8';tQ.textContent=q;tP.textContent='\u2014 '+pid;tt.classList.add('visible');tt.style.left='0';tt.style.top='0';tt.style.display='block';tt.style.opacity='0';requestAnimationFrame(()=>{const tw=tt.offsetWidth,th=tt.offsetHeight,r=el.getBoundingClientRect();let x=r.left+r.width/2-tw/2,y=r.top-th-8;if(x+tw>window.innerWidth-12)x=window.innerWidth-tw-12;if(x<12)x=12;if(y<12)y=r.bottom+8;tt.style.left=x+'px';tt.style.top=y+'px';tt.style.opacity='1';});}
function hideTT(){tt.classList.remove('visible');tt.style.display='none';aL=null;}
tt.querySelector('.tooltip-close').addEventListener('click',hideTT);
document.addEventListener('click',e=>{if(aL&&!tt.contains(e.target)&&e.target!==aL)hideTT();});

function sI(segs,t){for(const s of segs){if(t>=s.x1&&t<s.x2){const c=(s.x1+s.x2)/2,h=(s.x2-s.x1)/2,n=(t-c)/h,b=Math.exp(-3*n*n);return{v:s.pk*b+.03*(1-b),c:s.c};}}return{v:.03,c:'rgba(148,163,184,0.08)'};}
function pC(c){if(c.startsWith('#')){const h=c.slice(1);return{r:parseInt(h.substring(0,2),16),g:parseInt(h.substring(2,4),16),b:parseInt(h.substring(4,6),16),a:1};}const m=c.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);if(m)return{r:+m[1],g:+m[2],b:+m[3],a:m[4]!=null?+m[4]:1};return{r:148,g:163,b:184,a:.08};}
function sC(s){if(s.lc==='ai-label')return'#c4b5fd';if(s.lc==='elem-label')return'#6ee7b7';if(s.lc==='ask-label')return'#93c5fd';if(s.lc==='ext-label')return'#f9a8d4';return'#94a3b8';}

function svg(segs,pi){
  const W=800,H=64,bl=H-1,mH=H-6;
  let df='',pa='';
  segs.forEach((s,si)=>{
    const pc=pC(s.c),gid=`g${pi}_${si}`;
    df+=`<linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgb(${pc.r},${pc.g},${pc.b})" stop-opacity="${pc.a*.9}"/><stop offset="40%" stop-color="rgb(${pc.r},${pc.g},${pc.b})" stop-opacity="${pc.a*.65}"/><stop offset="100%" stop-color="rgb(${pc.r},${pc.g},${pc.b})" stop-opacity="${pc.a*.12}"/></linearGradient>`;
    const sx=Math.floor(s.x1*W),ex=Math.ceil(s.x2*W);
    let d=`M${sx},${bl}`;
    for(let x=sx;x<=ex;x++){const{v}=sI(segs,x/W);d+=`L${x},${(bl-Math.max(2,v*mH)).toFixed(1)}`;}
    d+=`L${ex},${bl}Z`;pa+=`<path d="${d}" fill="url(#${gid})"/>`;
  });
  let ri=`M0,${(bl-Math.max(2,sI(segs,0).v*mH)).toFixed(1)}`;
  for(let x=1;x<=W;x++)ri+=`L${x},${(bl-Math.max(2,sI(segs,x/W).v*mH)).toFixed(1)}`;
  const rgid=`rg${pi}`;let rg=`<linearGradient id="${rgid}" x1="0" y1="0" x2="1" y2="0">`;
  segs.forEach(s=>{const pc=pC(s.c);rg+=`<stop offset="${Math.max(0,s.x1)}" stop-color="rgba(${pc.r},${pc.g},${pc.b},0.8)"/><stop offset="${Math.min(1,s.x2)}" stop-color="rgba(${pc.r},${pc.g},${pc.b},0.8)"/>`;});
  rg+=`</linearGradient>`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:64px;display:block;"><defs>${df}${rg}</defs>${pa}<path d="${ri}" fill="none" stroke="url(#${rgid})" stroke-width="1.5"/><line x1="0" y1="${bl}" x2="${W}" y2="${bl}" stroke="rgba(255,255,255,0.04)" stroke-width="0.5" stroke-dasharray="4,6"/></svg>`;
}

function render(){
  ctr.innerHTML='';
  order.forEach((p,i)=>{
    const row=document.createElement('div');row.className='participant-row';row.draggable=true;row.dataset.idx=i;
    row.innerHTML=`<div class="row-header"><span class="drag-handle">\u2807</span><span class="pid">${p.id}</span><span class="prole">${p.role}</span><span class="ppattern" style="background:${p.pc}18;color:${p.pc};border:1px solid ${p.pc}33;">${p.pattern}</span></div><div class="chart-area">${svg(p.segs,i)}</div><div class="phase-labels"></div>`;
    const sv=row.querySelector('svg');
    sv.addEventListener('mousemove',e=>{
      const r=sv.getBoundingClientRect(),t=(e.clientX-r.left)/r.width,{v}=sI(p.segs,t);
      let seg=null;for(const s of p.segs)if(t>=s.x1&&t<s.x2){seg=s;break;}
      const dy=(r.bottom-1)-Math.max(2,v*(r.height-6)),dc=sC(seg||{lc:''});
      cd.style.left=e.clientX+'px';cd.style.top=dy+'px';cd.style.background=dc;cd.classList.add('visible');
      cl.style.left=e.clientX+'px';cl.style.top=r.top+'px';cl.style.height=r.height+'px';cl.style.background=dc;cl.classList.add('visible');
    });
    sv.addEventListener('mouseleave',()=>{cd.classList.remove('visible');cl.classList.remove('visible');});
    const lb=row.querySelector('.phase-labels');
    p.segs.forEach(s=>{
      const el=document.createElement('span');el.className=`phase-label ${s.lc}`;
      el.style.left=`${((s.x1+s.x2)/2*100).toFixed(1)}%`;el.textContent=s.l;
      if(s.q){el.classList.add('has-quote');el.addEventListener('click',e=>{e.stopPropagation();if(aL===el){hideTT();return;}aL=el;showTT(el,s.l,s.q,p.id+' \u2014 '+p.role,sC(s));});}
      lb.appendChild(el);
    });
    ctr.appendChild(row);
  });
  attachDrag();
}

let dI=null;
function attachDrag(){
  const rows=ctr.querySelectorAll('.participant-row');
  rows.forEach(r=>{
    r.addEventListener('dragstart',e=>{dI=+r.dataset.idx;r.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',dI);});
    r.addEventListener('dragend',()=>{r.classList.remove('dragging');rows.forEach(x=>{x.classList.remove('drag-over-above','drag-over-below');});});
    r.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';const rc=r.getBoundingClientRect();rows.forEach(x=>{x.classList.remove('drag-over-above','drag-over-below');});if(e.clientY<rc.top+rc.height/2)r.classList.add('drag-over-above');else r.classList.add('drag-over-below');});
    r.addEventListener('dragleave',()=>{r.classList.remove('drag-over-above','drag-over-below');});
    r.addEventListener('drop',e=>{e.preventDefault();const ti=+r.dataset.idx;if(dI===null||dI===ti)return;const rc=r.getBoundingClientRect(),before=e.clientY<rc.top+rc.height/2,item=order.splice(dI,1)[0];let ni=ti;if(dI<ti)ni--;if(!before)ni++;order.splice(ni,0,item);render();});
  });
}
render();
</script>
</body>
</html>
